<!doctype html>
<html lang="en">
	<head>
		<script>
			(function () {
				const stored = localStorage.getItem('loadr-theme');
				const theme =
					stored === 'dark' || stored === 'light'
						? stored
						: window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
				document.documentElement.classList.toggle('dark', theme === 'dark');
			})();

			window.__loadrDeferredInstallPrompt = null;
			window.addEventListener(
				'beforeinstallprompt',
				function (event) {
					event.preventDefault();
					window.__loadrDeferredInstallPrompt = event;
					window.dispatchEvent(new Event('loadr-installprompt-ready'));
				},
				{ capture: true }
			);
		</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#111827" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Loadr" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
